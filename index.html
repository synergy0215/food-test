<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>식습관 유형 테스트</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f7f6; }
        #test-container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        #progress-bar { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-bottom: 20px; overflow: hidden; display: none; }
        #progress { height: 100%; background: #4CAF50; width: 0%; transition: width 0.3s; }
        
        /* 폼 및 그룹 스타일 */
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; background-color: #fff; }
        
        .btn-group { display: flex; justify-content: space-around; margin-top: 20px; }
        button { padding: 15px 40px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.2rem; transition: background 0.2s; }
        .btn-start { background: #4CAF50; color: white; width: 100%; font-size: 1.1rem; padding: 15px; margin-top: 10px; }
        .btn-o { background: #ff4d4d; color: white; }
        .btn-x { background: #4d94ff; color: white; }
        .btn-back { background: #bbb; color: white; font-size: 0.9rem; padding: 10px 20px; margin-top: 20px; }
        .btn-restart { background: #333; color: white; font-size: 1rem; padding: 12px 30px; margin-top: 25px; }
        button:hover { opacity: 0.8; }
        
        /* 영역 제어 */
        #start-part { display: block; }
        #question-part { display: none; }
        #result { display: none; }
        
        .sub-title { font-size: 1.1rem; color: #666; font-weight: bold; margin-bottom: 5px; }
        .result-title { font-size: 1.8rem; margin-top: 0; margin-bottom: 15px; }
        .tip-box { background: #f9f9f9; padding: 15px; border-left: 5px solid #4CAF50; margin-top: 20px; text-align: left; border-radius: 4px; }
        .tip-title { font-weight: bold; color: #333; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="test-container">
    <div id="start-part">
        <h2 style="margin-bottom: 25px; color: #333;">🥗 식습관 유형 테스트</h2>
        <p style="color: #666; margin-bottom: 30px; font-size: 0.95rem;">나에게 딱 맞는 생존 조언을 보려면<br>나이와 성별을 선택해 주세요!</p>
        
        <div class="form-group">
            <label for="age-select">나이</label>
            <select id="age-select">
                <option value="" disabled selected>나이를 선택하세요</option>
            </select>
        </div>

        <div class="form-group">
            <label for="gender-select">성별</label>
            <select id="gender-select">
                <option value="" disabled selected>성별을 선택하세요</option>
                <option value="남성">남성</option>
                <option value="여성">여성</option>
                <option value="선택 안 함">선택 안 함</option>
            </select>
        </div>

        <button class="btn-start" onclick="startTest()">테스트 시작하기</button>
    </div>

    <div id="progress-bar"><div id="progress"></div></div>

    <div id="question-part">
        <h2 id="question-number">Q1.</h2>
        <p id="question-text">질문이 여기에 표시됩니다.</p>
        <div class="btn-group">
            <button class="btn-o" onclick="next(1)">O</button>
            <button class="btn-x" onclick="next(0)">X</button>
        </div>
        <button id="back-btn" class="btn-back" onclick="prev()">이전 질문으로</button>
    </div>

    <div id="result">
        <p id="result-sub" class="sub-title">서브 타이틀</p>
        <h2 id="result-type" class="result-title">유형명</h2>
        <p id="result-desc">설명</p>
        
        <div class="tip-box">
            <div class="tip-title">💡 생존을 위한 한 줄 조언</div>
            <div id="result-tip">조언 내용</div>
        </div>

        <button class="btn-restart" onclick="location.reload()">다시 하기</button>
    </div>
</div>

<script>
    // 페이지 로드 시 나이 드롭다운 생성 (0세~99세)
    window.addEventListener('DOMContentLoaded', () => {
        const ageSelect = document.getElementById('age-select');
        if (ageSelect) {
            for (let i = 0; i <= 99; i++) {
                const option = document.createElement('option');
                option.value = i + "세";
                option.innerText = `${i}세`;
                ageSelect.appendChild(option);
            }
        }
    });

    const questions = [
        "나는 아침을 잘 먹지 않는다.",
        "나는 일주일에 탄산음료를 3번 이상 마신다.",
        "나는 과일을 매일 챙겨 먹는다.",
        "나는 일주일에 카페인을 3번 이상 섭취한다.",
        "나는 일주일에 야식을 3번 이상 먹는다.",
        "나는 밥을 잘 씹지 않고 금방 삼킨다.",
        "나는 일주일에 간식을 5회 이상 먹는다.",
        "나는 일주일에 짠 음식을 3회 이상 먹는다.",
        "나는 일주일에 패스트푸드를 3회 이상 먹는다.",
        "나는 일주일에 불량식품을 3회 이상 먹는다."
    ];

    let currentIdx = 0;
    let scores = [];
    
    let userAge = "";
    let userGender = "";

    function startTest() {
        const ageSelect = document.getElementById('age-select');
        const genderSelect = document.getElementById('gender-select');

        if (!ageSelect.value || !genderSelect.value) {
            alert("나이와 성별을 모두 선택해 주세요!");
            return;
        }

        userAge = ageSelect.value;
        userGender = genderSelect.value;

        document.getElementById('start-part').style.display = 'none';
        document.getElementById('progress-bar').style.display = 'block';
        document.getElementById('question-part').style.display = 'block';

        updateQuestion();
    }

    function next(val) {
        scores.push(val);
        currentIdx++;

        if (currentIdx < questions.length) {
            updateQuestion();
        } else {
            showResult();
        }
    }

    function prev() {
        if (currentIdx > 0) {
            scores.pop();
            currentIdx--;
            updateQuestion();
        } else if (currentIdx === 0) {
            scores.pop();
            document.getElementById('question-part').style.display = 'none';
            document.getElementById('progress-bar').style.display = 'none';
            document.getElementById('start-part').style.display = 'block';
        }
    }

    function updateQuestion() {
        document.getElementById('question-number').innerText = `Q${currentIdx + 1}.`;
        document.getElementById('question-text').innerText = questions[currentIdx];
        document.getElementById('progress').style.width = `${(currentIdx / questions.length) * 100}%`;
    }

    function showResult() {
        document.getElementById('question-part').style.display = 'none';
        document.getElementById('progress').style.width = '100%';
        const resultArea = document.getElementById('result');
        resultArea.style.display = 'block';

        const totalScore = scores.reduce((a, b) => a + b, 0);

        let sub = "";
        let type = "";
        let desc = "";
        let tip = "";

        if(totalScore <= 2) {
            sub = "얼마나 잘 살고싶은 건지 감도 안옴...";
            type = "✨ 식단 갓생러형";
            desc = "자기관리 만렙! 유혹을 안광으로 튕겨내는 청정 식단의 소유자입니다. 이 정도면 건강계의 '육각형 인간' 인정입니다.";
            tip = "치팅 데이 한 번쯤은 가져도 괜찮아요! 지금처럼만 쭉 유지해 주세요.";
        } else if(totalScore <= 5) {
            sub = "맛있으면 0칼로리!(아님)";
            type = "🍭 길티플레저 추구형";
            desc = "맛있는 건 절대 못 참지! 즐거움을 챙기느라 건강은 살짝 뒷전인가요? 아직은 젊음으로 버티고 있지만 방심은 금물입니다.";
            tip = "하루에 한 번은 액상과당이나 탄산음료 대신 시원한 물을 마셔보는 건 어떨까요?";
        } else if(totalScore <= 8) {
            sub = "혈관: 살려줘";
            type = "🚨 혈당스파이크 경고형";
            desc = "몸이 서서히 지쳐가고 있어요. 혈관이 대놓고 눈치를 주는 중! 세포들이 파업 선언을 하기 전에 관리가 시급한 타입입니다.";
            tip = "밥 먹고 누워있기 금지! 식후 딱 10분만 가볍게 산책해도 혈당 스파이크를 막을 수 있어요.";
        } else {
            sub = "이러다 진짜 큰일 남...";
            type = "😱 혈관 손절형";
            desc = "지금 당신의 위장과 혈관은 '살려달라'고 DM을 보내는 중입니다. 현재 식습관은 몸을 공격하고 있는 것과 다름없으니 당장 식단 리모델링이 필요합니다.";
            tip = "오늘부터 편의점 뜸하게 가기! 일단 하루 한 끼라도 신선한 채소나 일반 한식을 제대로 챙겨 먹는 것부터 시작합시다.";
        }

        document.getElementById('result-sub').innerText = sub;
        document.getElementById('result-type').innerText = type;
        document.getElementById('result-desc').innerText = desc;
        document.getElementById('result-tip').innerText = tip;

        // ---------------- [데이터 자동 수집 및 전송] ----------------
        const payload = {
            age: userAge,
            gender: userGender,
            score: totalScore,
            type: type
        };

        const googleAppScriptURL = "https://script.google.com/macros/s/AKfycbwdXhjO7Lvspsv824jI4OfUra9_qa_g9NerVxClkE0jBLLVnb24VXIVcS4PqfxtgvU/exec"; 

        fetch(googleAppScriptURL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        })
        .then(() => console.log("데이터가 구글 시트로 전송되었습니다."))
        .catch(err => console.error("전송 에러:", err));
        // -------------------------------------------------------------
    }
</script>

</body>
</html>
